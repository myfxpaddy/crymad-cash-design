<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrymadX — Glass Morphism Design (Full 56 Screens)</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--g:#1B8C3E;--gl:#00C853;--ga:#69f0ae;--gd:#C9A84C;--r:#ef4444;--bg1:#071510;--bg2:#0a2118;--bg3:#050f0a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;font-family:'Space Grotesk',sans-serif;color:#e0e0e0;padding:16px}
.hdr{text-align:center;padding:24px;margin-bottom:30px;border-bottom:1px solid #1a1a2e}
.hdr h1{font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--g),var(--gl),var(--ga));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{color:#555;font-size:13px;margin-top:4px}
.sec{margin-bottom:8px}
.sec-l{color:var(--gl);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin:12px 0 6px 4px}
.row{display:flex;gap:14px;overflow-x:auto;padding:4px 0 16px;scroll-behavior:smooth}
.row::-webkit-scrollbar{height:4px}.row::-webkit-scrollbar-thumb{background:#1a2e1d;border-radius:2px}
/* Phone */
.pf{flex-shrink:0}.pb{width:280px;height:580px;border-radius:32px;padding:6px;background:linear-gradient(145deg,#1e2e24,#141e18);box-shadow:0 8px 32px rgba(0,0,0,.4)}.pi{width:100%;height:100%;border-radius:26px;overflow:hidden;position:relative;background:linear-gradient(160deg,var(--bg1),var(--bg2),var(--bg3))}.pl{text-align:center;margin-top:6px;font-size:9px;color:#555;font-weight:500}
.nt{position:absolute;top:0;left:50%;transform:translateX(-50%);width:88px;height:20px;background:#000;border-radius:0 0 12px 12px;z-index:20}
/* Blobs */
.b1{position:absolute;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(27,140,62,.12),transparent 70%);top:-40px;right:-40px;pointer-events:none}
.b2{position:absolute;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,83,.08),transparent 70%);bottom:30px;left:-30px;pointer-events:none}
/* Screen content */
.sc{position:absolute;inset:0;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}.sc::-webkit-scrollbar{display:none}
.sc-p{padding:30px 12px 12px}
/* Glass */
.g{background:rgba(255,255,255,.04);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:12px}
.g2{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px}
/* Typography */
h2{font-size:16px;font-weight:700;color:#fff}
h3{font-size:13px;font-weight:600;color:#fff}
.t2{color:rgba(255,255,255,.5);font-size:10px}
.t3{color:rgba(255,255,255,.3);font-size:9px}
.grn{color:var(--gl)}.red{color:var(--r)}.gld{color:var(--gd)}
/* Components */
.inp{display:flex;align-items:center;gap:6px;padding:10px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);font-size:10px;color:rgba(255,255,255,.4);margin:4px 0}
.inp svg{width:14px;height:14px;stroke:rgba(255,255,255,.3);flex-shrink:0}
.btn{padding:12px;border-radius:10px;text-align:center;font-weight:600;font-size:12px;cursor:pointer;margin:6px 0}
.btn-g{background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;box-shadow:0 4px 16px rgba(27,140,62,.3)}
.btn-o{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--gl)}
.btn-r{background:linear-gradient(135deg,#c53030,var(--r));color:#fff}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:8px;font-weight:600}
.badge-g{background:rgba(0,200,83,.12);color:var(--gl)}.badge-r{background:rgba(239,68,68,.12);color:var(--r)}.badge-gd{background:rgba(212,165,60,.12);color:var(--gd);border:1px solid rgba(212,165,60,.2)}
.tabs{display:flex;gap:3px;margin:6px 0}.tab{padding:6px 10px;border-radius:8px;font-size:9px;font-weight:600;color:rgba(255,255,255,.4);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04)}.tab.a{background:var(--g);color:#fff;border-color:var(--g)}
.dots{display:flex;gap:5px;justify-content:center;margin:8px 0}.dot{width:6px;height:6px;border-radius:3px;background:rgba(255,255,255,.15)}.dot.a{width:18px;background:var(--gl)}
/* List item */
.li{display:flex;align-items:center;gap:8px;padding:10px;border-radius:10px;margin:3px 0;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.li-i{width:32px;height:32px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.li-i svg{width:16px;height:16px;stroke-linecap:round;stroke-linejoin:round;fill:none}
.li-c{flex:1;min-width:0}.li-n{font-size:11px;font-weight:600;color:#fff}.li-s{font-size:8px;color:rgba(255,255,255,.4);margin-top:1px}
.li-r{text-align:right;flex-shrink:0}.li-v{font-size:11px;font-weight:600}.li-d{font-size:8px;color:rgba(255,255,255,.4);margin-top:1px}
/* Stat cards */
.stats{display:flex;gap:6px;margin:6px 0}.stat{flex:1;padding:8px;border-radius:8px;text-align:center;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}.stat-v{font-size:14px;font-weight:700}.stat-l{font-size:7px;color:rgba(255,255,255,.4);margin-top:2px}
/* Quick actions */
.qa{display:flex;gap:6px;justify-content:center;margin:8px 0}.qa-b{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}.qa-b svg{width:18px;height:18px;stroke:var(--gl)}.qa-b span{font-size:7px;color:rgba(255,255,255,.5)}
/* Bar chart */
.bar{height:3px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden;margin:3px 0}.bar .fl{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g),var(--gl))}
/* Bottom tab */
.btab{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:8px 0 10px;background:rgba(7,21,16,.92);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.04);z-index:15}
.bt{display:flex;flex-direction:column;align-items:center;gap:2px}.bt svg{width:18px;height:18px;stroke:rgba(255,255,255,.35);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}.bt span{font-size:7px;color:rgba(255,255,255,.35)}.bt.a svg{stroke:var(--gl)}.bt.a span{color:var(--gl)}
.bt-c{position:relative;top:-12px;width:44px;height:44px;border-radius:22px;background:linear-gradient(135deg,var(--g),var(--gl));display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(27,140,62,.3)}.bt-c svg{stroke:#fff;width:20px;height:20px}
/* Order book */
.ob{display:flex;gap:2px;margin:4px 0}.ob-c{flex:1}.ob-r{display:flex;justify-content:space-between;padding:2px 4px;font-size:7px;border-radius:2px;margin:1px 0}
.ob-r.bid{background:rgba(0,200,83,.06);color:var(--gl)}.ob-r.ask{background:rgba(239,68,68,.06);color:var(--r)}
/* Candlestick chart (CSS) */
.chart{height:80px;margin:4px 0;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-end;gap:2px;padding:8px 4px 4px;overflow:hidden}
.candle{width:4px;border-radius:1px;flex-shrink:0}
/* QR placeholder */
.qr{width:120px;height:120px;margin:8px auto;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr);gap:1px;padding:8px}
.qr span{background:rgba(255,255,255,.6);border-radius:1px}
/* Keypad */
.kpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:0 24px;margin:8px 0}
.kk{width:48px;height:48px;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;color:#fff;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);margin:0 auto}
/* PIN dots */
.pdots{display:flex;gap:12px;justify-content:center;margin:12px 0}.pdot{width:12px;height:12px;border-radius:6px;border:1.5px solid rgba(255,255,255,.2)}.pdot.f{background:var(--gl);border-color:var(--gl)}
/* Progress steps */
.steps{display:flex;gap:2px;margin:8px 0}.step{flex:1;text-align:center}.step .sn{width:20px;height:20px;border-radius:10px;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;background:rgba(255,255,255,.05);color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.08)}.step .sn.a{background:var(--g);color:#fff;border-color:var(--g)}.step .sn.d{background:rgba(0,200,83,.15);color:var(--gl);border-color:var(--gl)}.step .st{font-size:6px;color:rgba(255,255,255,.3);margin-top:3px}
/* Icon circle */
.ic{display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.ic svg{stroke-linecap:round;stroke-linejoin:round;fill:none;stroke:var(--gl);stroke-width:1.5}
/* Toggle */
.tgl{width:32px;height:18px;border-radius:9px;position:relative}.tgl.on{background:var(--g)}.tgl.off{background:rgba(255,255,255,.1)}.tgl::after{content:'';position:absolute;width:14px;height:14px;border-radius:7px;background:#fff;top:2px;transition:.2s}.tgl.on::after{left:16px}.tgl.off::after{left:2px}
/* Score ring */
.ring{width:80px;height:80px;border-radius:40px;border:4px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;margin:8px auto}.ring::before{content:'';position:absolute;inset:-4px;border-radius:44px;border:4px solid transparent;border-top-color:var(--gl);border-right-color:var(--gl);transform:rotate(45deg)}
.ring .rv{font-size:22px;font-weight:700;color:var(--gl)}.ring .rl{font-size:7px;color:rgba(255,255,255,.4)}
</style>
</head>
<body>
<div class="hdr">
<h1>CrymadX — Glass Morphism</h1>
<p>Full App Design &bull; 56 Production Screens &bull; Complete User Flow</p>
</div>

<script>
const P=(n,h,bt)=>`<div class="pf"><div class="pb"><div class="pi"><div class="nt"></div><div class="b1"></div><div class="b2"></div><div class="sc"><div class="sc-p">${h}</div></div>${bt?`<div class="btab"><div class="bt${bt==='home'?' a':''}"><svg><use href="#i-home"/></svg><span>Home</span></div><div class="bt${bt==='markets'?' a':''}"><svg><use href="#i-bar"/></svg><span>Markets</span></div><div class="bt"><div class="bt-c"><svg><use href="#i-swap"/></svg></div></div><div class="bt${bt==='wallet'?' a':''}"><svg><use href="#i-wallet"/></svg><span>Wallet</span></div><div class="bt${bt==='profile'?' a':''}"><svg><use href="#i-user"/></svg><span>Profile</span></div></div>`:''}</div></div><div class="pl">${n}</div></div>`;

const IC=(id,sz=24,clr='var(--gl)')=>`<svg width="${sz}" height="${sz}" stroke="${clr}" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><use href="#i-${id}"/></svg>`;

const LI=(icon,name,sub,val,valsub,clr)=>`<div class="li"><div class="li-i" style="background:rgba(${clr||'27,140,62'},.1)">${IC(icon,16,clr?`rgb(${clr})`:'var(--gl)')}</div><div class="li-c"><div class="li-n">${name}</div>${sub?`<div class="li-s">${sub}</div>`:''}</div><div class="li-r">${val?`<div class="li-v" style="${valsub&&valsub.includes('-')?'color:var(--r)':valsub&&valsub.includes('+')?'color:var(--gl)':''}">${val}</div>`:''}${valsub?`<div class="li-d">${valsub}</div>`:''}</div></div>`;

const CANDLES=()=>{let h='';const heights=[30,45,20,55,35,65,40,50,25,60,45,35,55,30,50,40,65,35,55,45,30,60,40,50,35,55,45,30,65,50,40,55,35,45,60,30,50,40];heights.forEach((v,i)=>{const g=i%3!==0;h+=`<div class="candle" style="height:${v}%;background:${g?'var(--gl)':'var(--r)'}"></div>`;});return h;};

const sections = [
// SECTION 1: ONBOARDING & AUTH
