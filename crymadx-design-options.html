<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrymadX — Mobile App Design Options (5 Themes, 60 Screens)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800&family=Rajdhani:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--g:#1B8C3E;--gl:#00C853;--ga:#69f0ae;--gd:#C9A84C;--bg:#0a1f12;--bg2:#0d2818;--bg3:#0f1a0f;--red:#ef4444;--t1:#e6edf3;--t2:#8b949e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;font-family:'Inter',sans-serif;color:#e0e0e0;padding:20px}
.ph{text-align:center;padding:30px;margin-bottom:40px;border-bottom:1px solid #1a1a2e}
.ph h1{font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--g),var(--gl),var(--ga));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.ph p{color:#666;font-size:14px;letter-spacing:2px;text-transform:uppercase}
.ph .sub{color:#444;font-size:12px;margin-top:8px;letter-spacing:0;text-transform:none}
.cat{margin-bottom:60px;padding:24px;border-radius:20px;background:#0c0c18;border:1px solid #1a1a2e}
.cat-h{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.cat-h .n{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--g),var(--gl))}
.cat-h h2{font-size:22px;font-weight:800;color:#fff}
.cat-d{color:#555;font-size:12px;margin-bottom:16px;padding-left:52px}
.rl{color:var(--g);font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin:14px 0 6px 2px}
.sr{display:flex;gap:12px;overflow-x:auto;padding:6px 0 14px}
.ph-f{width:220px;min-width:220px;flex-shrink:0}
.ph-b{height:460px;border-radius:30px;padding:5px;background:#1a1a2e;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.ph-i{width:100%;height:100%;border-radius:25px;overflow:hidden;position:relative;display:flex;flex-direction:column}
.ph-l{text-align:center;margin-top:5px;font-size:9px;font-weight:600;color:#666;letter-spacing:.5px}
.nt{position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:18px;background:#000;border-radius:0 0 12px 12px;z-index:10}
/* Screen content helpers */
.sc{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}
.sc-c{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;padding:8px}
.sc-t{flex:1;display:flex;flex-direction:column;z-index:2;padding:28px 10px 6px}
.ic{display:flex;align-items:center;justify-content:center;border-radius:50%}
.ic svg{stroke-linecap:round;stroke-linejoin:round;fill:none}
.dots{display:flex;gap:4px;justify-content:center;margin:6px 0}
.dots .d{width:6px;height:6px;border-radius:3px}.dots .d.a{width:16px}
.btn{margin:4px 8px;padding:8px;border-radius:8px;text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;z-index:2}
.inp{margin:3px 8px;padding:6px 8px;border-radius:6px;font-size:8px;z-index:2}
.bar{height:3px;border-radius:2px;overflow:hidden;z-index:2}.bar .fl{height:100%;border-radius:2px}
.tabs{display:flex;gap:3px;margin:4px 8px;z-index:2}.tabs .tb{padding:4px 6px;border-radius:4px;font-size:7px;font-weight:600}
.lst{margin:2px 8px;z-index:2}.lst .li{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;margin-bottom:2px}
.lst .li .li-ic{width:22px;height:22px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lst .li .li-t{font-size:8px;font-weight:600;flex:1}.lst .li .li-v{font-size:7px;text-align:right}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 20px;z-index:2}
.kp .k{width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:13px;margin:0 auto}
.pd{display:flex;gap:8px;justify-content:center;z-index:2}.pd .p{width:10px;height:10px;border-radius:5px}
.qb{display:flex;gap:4px;justify-content:center;z-index:2;margin:4px 0}.qb .q{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 6px;border-radius:6px}
.qb .q svg{width:14px;height:14px}.qb .q span{font-size:6px}
.btab{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-around;padding:6px 0 8px;z-index:20;border-top:1px solid rgba(27,140,62,.1)}
.btab .bt{display:flex;flex-direction:column;align-items:center;gap:1px}.btab .bt svg{width:16px;height:16px}.btab .bt span{font-size:6px}
.card{margin:3px 8px;padding:8px;border-radius:8px;z-index:2}
.badge{display:inline-flex;padding:2px 6px;border-radius:8px;font-size:6px;font-weight:700;letter-spacing:.5px}
.chart-placeholder{margin:3px 8px;height:50px;border-radius:6px;z-index:2;position:relative;overflow:hidden}
.chart-placeholder::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(180deg,transparent,rgba(27,140,62,.08))}
.stat-row{display:flex;gap:3px;margin:3px 8px;z-index:2}.stat-row .st{flex:1;padding:5px;border-radius:6px;text-align:center}
.stat-row .st .sv{font-size:10px;font-weight:700}.stat-row .st .sl{font-size:6px;margin-top:1px}
/* Grid overlay for d1 */
.gov{position:absolute;inset:0;background-image:linear-gradient(rgba(27,140,62,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(27,140,62,.03) 1px,transparent 1px);background-size:20px 20px;pointer-events:none}
/* Particles for d3 */
.ptc{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(1px 1px at 15% 25%,rgba(27,140,62,.3),transparent),radial-gradient(1px 1px at 65% 15%,rgba(0,200,83,.2),transparent),radial-gradient(1px 1px at 35% 65%,rgba(27,140,62,.2),transparent),radial-gradient(1px 1px at 85% 55%,rgba(105,240,174,.15),transparent),radial-gradient(1px 1px at 10% 75%,rgba(27,140,62,.25),transparent)}
/* Blobs for d2 */
.bl1{position:absolute;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(27,140,62,.15),transparent 70%);top:-40px;right:-40px;pointer-events:none}
.bl2{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,83,.1),transparent 70%);bottom:30px;left:-30px;pointer-events:none}
/* Waves for d4 */
.wt{position:absolute;top:0;left:0;right:0;height:160px;background:linear-gradient(180deg,rgba(27,140,62,.07),transparent);clip-path:ellipse(120% 100% at 50% 0%);pointer-events:none}
.wb{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(0deg,rgba(27,140,62,.04),transparent);clip-path:ellipse(120% 100% at 50% 100%);pointer-events:none}
/* Glow for d5 */
.sgw{position:absolute;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(27,140,62,.04),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.lnh{position:absolute;left:10px;right:10px;height:1px;background:linear-gradient(90deg,transparent,rgba(27,140,62,.08),transparent);pointer-events:none}
/* HUD corners for d1 */
.hc-tl{position:absolute;top:28px;left:8px;width:14px;height:14px;border-top:1px solid rgba(27,140,62,.15);border-left:1px solid rgba(27,140,62,.15);z-index:4;pointer-events:none}
.hc-br{position:absolute;bottom:8px;right:8px;width:14px;height:14px;border-bottom:1px solid rgba(27,140,62,.15);border-right:1px solid rgba(27,140,62,.15);z-index:4;pointer-events:none}
/* XP bar for d3 */
.xpb{position:absolute;top:24px;left:10px;right:10px;z-index:5;pointer-events:none}
.xpb .xpt{height:2px;border-radius:1px;background:rgba(27,140,62,.1);overflow:hidden}.xpb .xpf{height:100%;background:linear-gradient(90deg,var(--g),var(--gl));border-radius:1px}
.xpb .xpl{font-size:5px;color:rgba(27,140,62,.4);text-align:right;margin-top:1px;letter-spacing:.5px}
/* Achievement ring for d3 */
.ar{width:70px;height:70px;border-radius:35px;border:2px solid rgba(27,140,62,.2);background:rgba(27,140,62,.03);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2}
.ar svg{width:28px;height:28px;stroke:var(--g);stroke-width:1.5;fill:none}
.ar .arl{font-size:5px;color:var(--ga);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
/* Level badge for d3 */
.lvl{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:8px;background:rgba(27,140,62,.06);border:1px solid rgba(27,140,62,.15);z-index:2}
.lvl span{font-size:6px;color:var(--ga);letter-spacing:.5px}
/* Theme-specific screen bg & fonts */
.d1 .sc{background:var(--bg)}.d1 h3{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--gl);letter-spacing:.8px;z-index:2}.d1 .stx{font-size:7px;color:#3a5a42;text-align:center;z-index:2;line-height:1.4;padding:0 8px}
.d1 .ic{border:1px solid rgba(27,140,62,.25);background:rgba(27,140,62,.05)}.d1 .ic svg{stroke:var(--g);stroke-width:1.5}
.d1 .dots .d{background:rgba(27,140,62,.12)}.d1 .dots .d.a{background:var(--g)}
.d1 .btn{border:1px solid rgba(27,140,62,.25);background:rgba(27,140,62,.05);color:var(--g);font-family:'Orbitron',sans-serif}
.d1 .btn.s{background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;border:none}
.d1 .inp{border:1px solid rgba(27,140,62,.15);background:rgba(27,140,62,.03);color:var(--t2)}
.d1 .tabs .tb{background:rgba(27,140,62,.05);color:var(--t2);border:1px solid rgba(27,140,62,.1)}.d1 .tabs .tb.a{background:var(--g);color:#fff}

.d1 .lst .li .li-t{color:var(--t1)}.d1 .lst .li .li-v{color:var(--ga)}
.d1 .kp .k{border:1px solid rgba(27,140,62,.12);color:var(--g);font-family:'Orbitron',sans-serif;font-size:11px}
.d1 .pd .p{border:1px solid rgba(27,140,62,.25)}.d1 .pd .p.f{background:var(--g);border-color:var(--g)}
.d1 .card{background:rgba(27,140,62,.04);border:1px solid rgba(27,140,62,.1)}.d1 .stat-row .st{background:rgba(27,140,62,.04);border:1px solid rgba(27,140,62,.08)}
.d1 .stat-row .st .sv{color:var(--gl)}.d1 .stat-row .st .sl{color:var(--t2)}
.d1 .chart-placeholder{background:rgba(27,140,62,.03);border:1px solid rgba(27,140,62,.06)}
.d1 .qb .q{background:rgba(27,140,62,.05);border:1px solid rgba(27,140,62,.1)}.d1 .qb .q svg{stroke:var(--g)}.d1 .qb .q span{color:var(--t2)}

.d1 .bar{background:rgba(27,140,62,.08)}.d1 .bar .fl{background:linear-gradient(90deg,var(--g),var(--gl))}

{n:'Support',t:'sc-t',h:`<h3>SUPPORT TICKETS</h3><div class="stat-row" style="margin-top:4px"><div class="st"><div class="sv">1</div><div class="sl">Tickets</div></div><div class="st"><div class="sv" style="color:var(--gl)">1</div><div class="sl">Open</div></div><div class="st"><div class="sv">0</div><div class="sl">Progress</div></div><div class="st"><div class="sv">0</div><div class="sl">Resolved</div></div></div><div class="btn s" style="margin-top:4px;font-size:7px">+ NEW TICKET</div><div class="tabs" style="margin-top:4px"><div class="tb a">All 1</div><div class="tb">Open 1</div><div class="tb">Resolved 0</div></div><div class="lst"><div class="li"><div class="li-ic"><svg width="10" height="10"><use href="#i-mail"/></svg></div><div class="li-t">AI Chat Escalation<br><span style="font-size:5px;color:var(--t2)">General · Updated today</span></div><div class="badge" style="color:var(--gl)">Open</div></div></div>`}
]}
]};

// Theme definitions
const themes = [
  {id:'d1',name:'Cyber Grid',desc:'Grid overlay, scan line animation, HUD corner brackets, Orbitron font. Tech command-center feel.',deco:p=>`<div class="gov"></div><div class="scanl"></div><div class="hc-tl"></div><div class="hc-br"></div>`},
  {id:'d2',name:'Glass Morphism',desc:'Frosted glass cards, soft blurred gradient blobs, Space Grotesk font. Premium elegant feel.',deco:p=>`<div class="bl1"></div><div class="bl2"></div>`},
  {id:'d3',name:'Gamified RPG',desc:'XP bars, achievement rings, level badges, floating particles, Rajdhani font. Gamified progression.',deco:p=>`<div class="ptc"></div><div class="xpb"><div class="xpt"><div class="xpf" style="width:65%"></div></div><div class="xpl">XP</div></div>`},
  {id:'d4',name:'Bold Waves',desc:'Organic wave shapes, large bold typography, gradient CTAs with shadows, Outfit font. High-energy.',deco:p=>`<div class="wt"></div><div class="wb"></div>`},
  {id:'d5',name:'Luxe Minimal',desc:'Thin decorative lines, subtle glow, maximum whitespace, thin Inter font. Institutional feel.',deco:p=>`<div class="sgw"></div><div class="lnh" style="top:28px"></div>`}
];

// Render all themes
const root = document.body;
themes.forEach((theme,ti) => {
  const cat = document.createElement('div');
  cat.className = `cat ${theme.id}`;
  let html = `<div class="cat-h"><div class="n">${ti+1}</div><h2>${theme.name}</h2></div><p class="cat-d">${theme.desc}</p>`;

  S.rows.forEach(row => {
    html += `<div class="rl">${row.label}</div><div class="sr">`;
    row.screens.forEach(screen => {
      const hasBtab = screen.bt;
      html += `<div class="ph-f"><div class="ph-b"><div class="ph-i"><div class="sc">`;
      html += `<div class="nt"></div>`;
      html += theme.deco();
      if(screen.t === 'sc-c') {
        html += `<div class="sc-c">${screen.h}</div>`;
      } else {
        html += `<div class="sc-t">${screen.h}</div>`;
      }
      if(hasBtab) {
        html += `<div class="btab"><div class="bt a"><svg><use href="#i-home"/></svg><span>Home</span></div><div class="bt"><svg><use href="#i-bar"/></svg><span>Markets</span></div><div class="bt"><svg><use href="#i-swap"/></svg><span>Trade</span></div><div class="bt"><svg><use href="#i-wallet"/></svg><span>Wallet</span></div><div class="bt"><svg><use href="#i-user"/></svg><span>Profile</span></div></div>`;
      }
      html += `</div></div></div><div class="ph-l">${screen.n}</div></div>`;
    });
    html += `</div>`;
  });

  cat.innerHTML = html;
  root.appendChild(cat);
});
</script>
</body>
</html>
